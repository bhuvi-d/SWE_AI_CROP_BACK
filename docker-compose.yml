version: '3.8'

services:
  # Node.js Backend
  node-backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - MONGO_URL=mongodb://mongodb:27017/crop_ai
      - AI_SERVICE_URL=http://ai-service:5001
      - NODE_ENV=development
    depends_on:
      - mongodb
      - ai-service
    networks:
      - crop-network

  # Python AI Service
  ai-service:
    build:
      context: ./ai_service
      dockerfile: Dockerfile
    ports:
      - "5001:5001"
    networks:
      - crop-network

  # MongoDB Database (Local)
  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - crop-network

networks:
  crop-network:
    driver: bridge

volumes:
  mongo-data:
